name: Flight Price Alert

on:
  schedule:
    - cron: "0 */6 * * *"

  workflow_dispatch:

jobs:
  check-flight:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install packages
      run: pip install -r requirements.txt

    - name: Check flights
      run: python check_flights.py
